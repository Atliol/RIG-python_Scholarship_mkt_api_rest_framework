<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-container {
            min-height: 100vh;
        }
    </style>
</head>
<body>

<div class="container login-container d-flex justify-content-center align-items-center">
    <div class="card shadow-lg border-0 rounded-4 p-4 p-sm-5 style-card" style="max-width: 450px; width: 100%;">
        
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark mb-1">အကောင့်ဝင်ရန် (Login)</h2>
            <p class="text-muted small">ကျေးဇူးပြု၍ သင့်အချက်အလက်များကို ဖြည့်စွက်ပါ</p>
        </div>

        <form action="" method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold text-secondary small">Username</label>
                <input type="text" class="form-control form-control-lg rounded-3 fs-6" id="username" name="username" placeholder="Username ရိုက်ထည့်ပါ" required>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold text-secondary small">Password</label>
                <input type="password" class="form-control form-control-lg rounded-3 fs-6" id="password" name="password" placeholder="Password ရိုက်ထည့်ပါ" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 mb-3 fw-bold shadow-sm">Login</button>
        </form>

       
        
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
