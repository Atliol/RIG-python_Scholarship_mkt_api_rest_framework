<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <meta name="theme-color" content="#712cf9" />
    <title>Update Blog Post</title>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 650px;
            margin: 50px auto;
        }
    </style>
</head>
<body>
    
<div class="container">
    <div class="form-container">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4 p-sm-5">
                
                <h3 class="card-title text-center mb-4 fw-bold text-dark">Update Blog Post</h3>
                
                <form action="" method="post">
                    {% csrf_token %}
                    
                    <div class="form-floating mb-3">
                        <input type="text" name="title" class="form-control" id="titleInput" placeholder="Enter title" value="{{blog.title}}" required>
                        <label for="titleInput">Blog Title</label>
                    </div>
                    
                    <div class="form-floating mb-4">
                        <textarea name="post_body" class="form-control" id="bodyInput" placeholder="Write your post here..." style="height: 200px" required>{{blog.post_body}}</textarea>
                        <label for="bodyInput">Post Body</label>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg fw-semibold shadow-sm">
                            Update Post
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
